name: Beta Release

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  beta-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feat/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bump versions (beta)
        run: bun scripts/bump-versions.ts patch beta

      - name: Build packages
        run: bun run build

      - name: Setup npm auth
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish beta to npm
        run: |
          (cd packages/core && npm publish --tag beta)
          (cd packages/cli && npm publish --tag beta)
          (cd packages/create-lunar-kit && npm publish --tag beta)
          (cd packages/primitives/adaptive-modal && npm publish --tag beta)
          (cd packages/primitives/bottom-sheet && npm publish --tag beta)

      - name: Create beta release tag
        run: |
          VERSION=$(cat packages/core/package.json | grep '"version"' | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: bump beta versions"
          git tag "v${VERSION}"
          git push origin v${VERSION}
