name: SonarCloud

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29

      - name: Setup Bun
        uses: oven-sh/setup-bun@bd4efb3f3e765dc0e78e683974e45619f9c07849

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@4b4701faf51bbb97dd683b87b452e39d8005edfb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=lunar-kit
            -Dsonar.organization=eularix
            -Dsonar.exclusions=**/**/example/**,**/docs/**,**/docs-v2/**
            -Dsonar.sonar.sources=.
            -Dsonar.pullRequest.provider=github
