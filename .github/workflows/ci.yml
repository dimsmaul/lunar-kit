name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter @lunar-kit/core build

      - name: Build CLI
        run: bun run --filter @lunar-kit/cli build

      - name: Build create-lunar-kit
        run: bun run --filter create-lunar-kit build
