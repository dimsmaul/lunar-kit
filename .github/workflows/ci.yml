name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29

      - name: Setup Bun
        uses: oven-sh/setup-bun@bd4efb3f3e765dc0e78e683974e45619f9c07849
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter @lunar-kit/core build

      - name: Build CLI
        run: bun run --filter @lunar-kit/cli build

      - name: Build create-lunar-kit
        run: bun run --filter create-lunar-kit build
