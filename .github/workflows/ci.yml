name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter @lunar-kit/core build

      - name: Build CLI
        run: bun run --filter @lunar-kit/cli build

      - name: Build create-lunar-kit
        run: bun run --filter create-lunar-kit build
