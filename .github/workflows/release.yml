name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Extract version from commit
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ $COMMIT_MSG =~ release:\ (major|minor|patch) ]]; then
            TYPE="${BASH_REMATCH[1]}"
            echo "type=$TYPE" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump versions
        run: bun scripts/bump-versions.ts ${{ steps.version.outputs.type }}

      - name: Build packages
        run: bun run build

      - name: Setup npm auth
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          (cd packages/core && npm publish)
          (cd packages/cli && npm publish)
          (cd packages/create-lunar-kit && npm publish)
          (cd packages/primitives/adaptive-modal && npm publish)
          (cd packages/primitives/bottom-sheet && npm publish)

      - name: Create release
        run: |
          VERSION=$(cat packages/core/package.json | grep '"version"' | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: bump release versions"
          git tag "v${VERSION}"
          git push origin v${VERSION}
          
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
