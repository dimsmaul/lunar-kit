name: Release

on:
  push:
    tags:
      - 'v*'
      - 'core-v*'
      - 'cli-v*'
      - 'create-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter @lunar-kit/core build

      - name: Build CLI
        run: bun run --filter @lunar-kit/cli build

      - name: Build create-lunar-kit
        run: bun run --filter create-lunar-kit build

      - name: Publish @lunar-kit/core
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/core-v')
        run: npm publish --filter @lunar-kit/core --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lunar-kit/cli
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/cli-v')
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-lunar-kit
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/create-v')
        run: npm publish --access public
        working-directory: packages/create-lunar-kit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
