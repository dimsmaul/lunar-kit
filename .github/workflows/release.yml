name: Release

on:
  push:
    tags:
      - 'v*'
      - 'core-v*'
      - 'cli-v*'
      - 'create-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @lunar-kit/core build

      - name: Build CLI
        run: pnpm --filter @lunar-kit/cli build

      - name: Build create-lunar-kit
        run: pnpm --filter create-lunar-kit build

      - name: Publish @lunar-kit/core
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/core-v')
        run: pnpm --filter @lunar-kit/core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lunar-kit/cli
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/cli-v')
        run: pnpm --filter @lunar-kit/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-lunar-kit
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/create-v')
        run: pnpm --filter create-lunar-kit publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
