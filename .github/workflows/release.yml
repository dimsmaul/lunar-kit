name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install

      - name: Extract version from commit
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ release:\ (version|major|minor|patch) ]]; then
            BUMP_TYPE="${BASH_REMATCH[1]}"
            # Map user semantic to script variables:
            # release: version → bump first digit (v0.1.0 → v1.0.0)
            # release: major → bump second digit (v0.0.20 → v0.1.0)
            # release: minor → bump third digit (v0.1.0 → v0.1.1)
            case "$BUMP_TYPE" in
              version) TYPE="version" ;;
              major) TYPE="major" ;;
              minor|patch) TYPE="minor" ;;
              *) TYPE="patch" ;;
            esac
            echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        run: bun scripts/bump-versions.ts ${{ steps.version.outputs.type }}

      - name: Build packages
        run: bun run build

      - name: Setup npm auth
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          (cd packages/core && npm publish)
          (cd packages/cli && npm publish)
          (cd packages/create-lunar-kit && npm publish)
          (cd packages/primitives/adaptive-modal && npm publish)
          (cd packages/primitives/bottom-sheet && npm publish)

      - name: Create release
        run: |
          VERSION=$(cat packages/core/package.json | grep '"version"' | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: bump release versions"
          git tag "v${VERSION}"
          git push origin v${VERSION}
          
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
