name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Check if changeset exists
        id: changeset
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR if changeset missing
        if: steps.changeset.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Missing Changeset**\n\nThis PR requires a changeset to document changes. Run:\n\n```bash\nbun changeset:create\n```\n\nOr use `bun changeset` for the manual Changesets prompt.'
            })

      - name: Fail if changeset missing
        if: steps.changeset.outputs.missing == 'true'
        run: exit 1
